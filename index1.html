<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="道玄文集 - 古典诗词与散文杂记">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'  viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%235a3921'>📜</text></svg>">
    <title>道玄文集</title>
<!-- 百度统计代码（异步加载，不阻塞页面渲染） -->
<script async src="https://hm.baidu.com/hm.js?35b5524e050763995511f80570ae121c"></script>

    <link rel="stylesheet" href="style.css">
    <!-- 文章数据（通过script标签加载，兼容本地 file:// 协议） -->
    <script src="articles1.js"></script>
</head>
<body>
    <!-- 左侧目录 -->
    <aside class="sidebar">
        <div class="author-link">
            <a href="jianjie.html" class="author-copyright-link">
                📝 关于作者版权 
            </a>
        </div>
        
        <h2>文章目录</h2>
        
        <div class="filter-container">
            <select class="filter-select" id="categoryFilter" onchange="filterArticles()">
                <option value="" disabled selected>文章分类：全部</option>
                <option value="all">全部</option>
                <option value="诗">诗</option>
                <option value="词">词</option>
                <option value="散文">散文</option>
                <option value="其它">其它</option>
            </select>
        </div>
        
        <ul class="article-list" id="articleList">
            <!-- 动态生成目录 -->
            <li><div class="loading">📖 加载文章中...</div></li>
        </ul>
    </aside>
    
    <!-- 移动端侧边栏切换按钮 -->
    <div class="sidebar-toggle" onclick="toggleSidebar()">
        <span id="sidebar-icon">≡</span>
    </div>
    
    <!-- 右侧文章 -->
    <main class="content" id="articleContent">
        <header class="collection-header">
            <h1 lang="zh">道玄文集</h1>
            
            <!-- 页面导航（卷按钮将动态插入此处） -->
            <nav class="page-navigation" id="mainNav">
                <a href="index.html"  class="page-link">扉页</a>
                <a href="https://mp.weixin.qq.com/mp/appmsgalbum?__biz=Mzk0ODc1MzcxMg==&action=getalbum&album_id=4070727578921992197#wechat_redirect"  class="page-link">微信公众号</a>
                <a href="search.html" class="page-link">全文搜索</a>
                <a href="txt2json.html"  class="page-link">文本工具</a>              
            </nav>
            
            <div role="search" class="search-bar">
                <input type="search" id="searchInput" placeholder="输入关键词搜索..." aria-label="搜索文章">
                <button onclick="searchArticles()">搜索</button>
            </div>
        </header>
        
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('catalog')">目录</button>
            <button class="tab-btn" onclick="switchTab('article')">文章</button>
        </div>
        
        <div class="tab-content active" id="catalogTab">
            <!-- 目录内容已在侧边栏显示 -->
        </div>
        
        <div class="tab-content" id="articleTab">
            <nav class="article-nav">
                <a href="#" id="prevArticle">← 上一篇</a>
                <a href="#" id="nextArticle">下一篇 →</a>
            </nav>
            
            <article>
                <h1 class="article-title" id="articleTitle">欢迎来到道玄文集</h1>
                <div class="article-meta" id="articleMeta">
                    <span>请从左侧选择文章</span>
                </div>
                <div class="article-content" id="articleText">
                    <p>请等待加载...</p>
                </div>
            </article>
            
            <nav class="article-nav">
                <a href="#" id="prevArticleBottom">← 上一篇</a>
                <a href="#" id="nextArticleBottom">下一篇 →</a>
            </nav>
        </div>
    </main>
    
    <!-- 悬浮导航 -->
    <div class="article-float-nav">
        <a href="#" id="mobilePrevArticle">← 上一篇</a>
        <a href="#" id="mobileNextArticle">下一篇 →</a>
    </div>
 
    <script>
        // ============================================================
        // 1. 全局变量
        // ============================================================
        let articles = [];
        let currentArticleIndex = 0;
        let currentSearchKeyword = '';
        let activeFilter = 'all';
        let sidebarHidden = false;
        let lastScrollTop = 0;
        let searchTimer = null;
        let isDataLoaded = false;

        // ============================================================
        // 2. 分卷相关变量与函数（新增）
        // ============================================================
        let currentVolume = 1;
        const ARTICLES_PER_VOLUME = 50;

        function getTotalVolumes() {
            return Math.ceil(articles.length / ARTICLES_PER_VOLUME);
        }

        function getCurrentVolumeArticles() {
            const start = (currentVolume - 1) * ARTICLES_PER_VOLUME;
            const end = Math.min(start + ARTICLES_PER_VOLUME, articles.length);
            return articles.slice(start, end);
        }

        // 动态生成卷导航按钮
        function renderVolumeNav() {
            const total = getTotalVolumes();
            if (total <= 1) {
                // 只有一卷时，移除所有卷按钮（保留扉页等固定链接）
                document.querySelectorAll('.volume-btn').forEach(btn => btn.remove());
                return;
            }
            
            const navContainer = document.getElementById('mainNav');
            // 移除旧的卷按钮（只移除带有 volume-btn 类的）
            navContainer.querySelectorAll('.volume-btn').forEach(btn => btn.remove());
            
            // 找到“微信公众号”链接作为插入锚点
            const wechatLink = navContainer.querySelector('a[href*="wechat"]');
            
            for (let i = 1; i <= total; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = 'page-link volume-btn' + (i === currentVolume ? ' active' : '');
                a.dataset.vol = i;
                a.textContent = '卷' + i;
                a.onclick = function(e) {
                    e.preventDefault();
                    switchVolume(i);
                };
                // 插入到“微信公众号”链接之前
                navContainer.insertBefore(a, wechatLink);
            }
        }

        // 切换卷
        function switchVolume(vol) {
            if (vol === currentVolume) return;
            currentVolume = vol;
            // 更新导航按钮高亮
            document.querySelectorAll('.volume-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.vol) === vol);
            });
            // 重置分类筛选为“全部”
            const filterSelect = document.getElementById('categoryFilter');
            if (filterSelect) {
                filterSelect.value = 'all';
                activeFilter = 'all';
            }
            // 清空搜索关键词
            currentSearchKeyword = '';
            document.getElementById('searchInput').value = '';
            // 重新渲染目录
            renderArticleList();
            // 加载当前卷的第一篇文章
            const filtered = applyFilters();
            if (filtered.length > 0) {
                loadArticle(articles.indexOf(filtered[0]));
            } else {
                document.getElementById('articleText').innerHTML = '<div class="loading">📭 该卷暂无文章</div>';
                document.getElementById('articleTitle').textContent = '欢迎来到道玄文集';
                document.getElementById('articleMeta').innerHTML = '<span>请从左侧选择文章</span>';
            }
        }

        // ============================================================
        // 3. 从 articles1.js 加载数据
        // ============================================================

function loadArticlesFromTxt() {
    try {
        if (typeof articlesData === 'undefined') {
            throw new Error('articlesData 未定义，请确保 articles1.js 已正确加载');
        }
        
        const parsed = parseArticlesFromTxt(articlesData);
        if (parsed.length === 0) {
            throw new Error('未能解析出任何文章，请检查格式');
        }
        
        articles = parsed;
        isDataLoaded = true;
        console.log('✅ 成功加载 ' + articles.length + ' 篇文章');
        
        renderVolumeNav();
        renderArticleList();
        
        // 检查 URL 参数，支持从搜索页跳转
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('article');
        if (articleId !== null) {
            const index = parseInt(articleId);
            if (!isNaN(index) && index >= 0 && index < articles.length) {
                const vol = Math.floor(index / ARTICLES_PER_VOLUME) + 1;
                if (vol !== currentVolume) {
                    switchVolume(vol);
                }
                setTimeout(() => loadArticle(index), 300);
                return;
            }
        }
        
        if (articles.length > 0) {
            loadArticle(0);
        }
                
    } catch (error) {
        console.error('❌ 加载失败:', error);
        document.getElementById('articleList').innerHTML = 
            '<li style="text-align: center; padding: 20px; color: #c0392b;">' +
                '⚠️ 加载失败：' + error.message + '<br>' +
                '<small>请确保 articles1.js 文件存在于同一目录下</small>' +
            '</li>';
        document.getElementById('articleText').innerHTML = 
            '<div class="loading" style="color: #c0392b;">' +
                '⚠️ 数据加载失败<br>' +
                '<small>' + error.message + '</small>' +
            '</div>';
    }
}

        // ============================================================
        // 4. 解析 TXT 文件（移植自 txt2json.html）
        // ============================================================
        function parseArticlesFromTxt(text) {
            // 分隔符：至少4个连续的中文破折号、等号、星号等
            const separator = /[─═━─=※§]{4,}|\n{2,}[*#]{3,}\n{2,}/;
            const rawDocs = text.split(separator);
            const results = [];
            let id = 1;

            for (const doc of rawDocs) {
                const trimmed = doc.trim();
                if (!trimmed) continue;
                
                const parsed = parseSingleDocument(trimmed, id++);
                if (parsed) results.push(parsed);
            }
            
            return results;
        }

        function parseSingleDocument(docText, id) {
            const lines = docText.split('\n');
            if (lines.length < 2) return null;

            // 标题：去掉书名号
            let title = lines[0].trim().replace(/^[《\s]+|[》\s]+$/g, '');

            // 第二行：分类｜日期
            const metaLine = lines[1].trim();
            let category = '其它';
            let date = '未标注日期';

            // 尝试匹配 "分类｜日期" 格式
            const metaMatch = metaLine.match(/^([^｜|]+)[｜|]\s*(.*)$/);
            if (metaMatch) {
                const rawCategory = metaMatch[1].trim();
                if (/诗|绝|律/.test(rawCategory)) category = '诗';
                else if (/词|令|引/.test(rawCategory)) category = '词';
                else if (/散文|赋|记/.test(rawCategory)) category = '散文';
                else category = rawCategory;
                
                date = metaMatch[2].trim() || '未标注日期';
            }

            // 正文：从第3行开始
            let contentLines = [];
            let notes = [];
            let inNotes = false;
            let noteType = '注';

            for (let i = 2; i < lines.length; i++) {
                const line = lines[i];
                const trimmedLine = line.trim();

                // 检测注释开始
                const noteStart = trimmedLine.match(/^(注|注释|附|附记|附注)[：:]/);
                if (noteStart) {
                    inNotes = true;
                    noteType = noteStart[1];
                    const noteContent = line.replace(new RegExp(`^${noteType}[：:]`), '').trim();
                    if (noteContent) notes.push(noteContent);
                    continue;
                }

                if (inNotes) {
                    if (trimmedLine) notes.push(trimmedLine);
                } else {
                    contentLines.push(line);
                }
            }

            // 构建 HTML 内容
            let content = contentLines.join('\n');
            
            // 处理换行：保留空行，用于诗词格式
            content = content.replace(/\n/g, '<br>');
            
            // 如果正文中包含连续的两个<br>，说明是分段，用</p><p>包裹
            const paragraphs = content.split(/<br>\s*<br>/);
            if (paragraphs.length > 1) {
                content = paragraphs.map(p => '<p>' + p.trim() + '</p>').join('');
            } else {
                content = '<p>' + content + '</p>';
            }

            // 添加注释
            if (notes.length > 0) {
                content += `<p>${noteType}：</p><p>${notes.join(' ')}</p>`;
            }

            return {
                id: id,
                title: title,
                category: category,
                date: date,
                content: content
            };
        }

        // ============================================================
        // 5. 核心渲染与交互函数（已修改 applyFilters 支持分卷）
        // ============================================================
        
        // 渲染目录
        function renderArticleList() {
            const filteredArticles = applyFilters();
            const listContainer = document.getElementById('articleList');
            const fragment = document.createDocumentFragment();

            if (filteredArticles.length > 0) {
                filteredArticles.forEach((article, index) => {
                    const li = document.createElement('li');
                    const realIndex = articles.indexOf(article);
                    li.innerHTML = `
                        <a href="#" onclick="loadArticle(${realIndex})" class="${currentArticleIndex === realIndex ? 'active' : ''}">
                            <span class="article-number">${realIndex + 1}.</span>
                            ${currentSearchKeyword ? highlightKeyword(article.title, currentSearchKeyword) : article.title}
                            <small>(${article.category})</small>
                        </a>
                    `;
                    fragment.appendChild(li);
                });
            } else {
                const li = document.createElement('li');
                li.innerHTML = `<div style="text-align:center;padding:15px;color:#7A8B7B;">没有找到符合条件的文章</div>`;
                fragment.appendChild(li);
            }

            listContainer.innerHTML = '';
            listContainer.appendChild(fragment);
        }

        // 应用筛选：先按卷筛选，再按分类筛选
        function applyFilters() {
            // 先按卷筛选
            let filtered = getCurrentVolumeArticles();
            
            // 再按分类筛选
            if (activeFilter === '散文') {
                filtered = filtered.filter(a => a.category === '散文');
            } else if (activeFilter === '诗') {
                filtered = filtered.filter(a => a.category === '诗');
            } else if (activeFilter === '词') {
                filtered = filtered.filter(a => a.category === '词');
            } else if (activeFilter === '其它') {
                filtered = filtered.filter(a => a.category !== '诗' && a.category !== '词' && a.category !== '散文');
            }
            return filtered;
        }

        function filterArticles() {
            const val = document.getElementById('categoryFilter').value;
            if (val) {
                activeFilter = val;
                renderArticleList();
                const filtered = applyFilters();
                if (filtered.length > 0 && !filtered.includes(articles[currentArticleIndex])) {
                    loadArticle(articles.indexOf(filtered[0]));
                }
            }
        }

        function loadArticle(index) {
            if (!articles.length || index < 0 || index >= articles.length) return;
            
            document.getElementById('articleText').innerHTML = '<div class="loading">🕯️ 文章加载中...</div>';
            
            setTimeout(() => {
                const article = articles[index];
                currentArticleIndex = index;
                
                document.getElementById('articleTitle').textContent = article.title;
                document.getElementById('articleMeta').innerHTML = `
                    <span>分类：${article.category}</span>
                    <span>日期：${article.date}</span>
                    <span>编号：${article.id}</span>
                `;

                let content = article.content;
                
                // 注释样式
                content = content
                    .replace(/<p>(注[:：][\s\S]*?)(?=<p>《|$)/g, '<div class="annotation">$1</div>')
                    .replace(/<p>(附[:：][\s\S]*?)(?=<p>《|$)/g, '<div class="annotation">$1</div>')
                    .replace(/<p>(注释[:：][\s\S]*?)(?=<p>《|$)/g, '<div class="annotation">$1</div>')
                    .replace(/<p>(附注[:：][\s\S]*?)(?=<p>《|$)/g, '<div class="annotation">$1</div>')
                    .replace(/<p>(附记[:：][\s\S]*?)(?=<p>《|$)/g, '<div class="annotation">$1</div>')
                    .replace(/<p>《(.*?)》<\/p>/g, '<p class="poem-title">《$1》</p>');

                // 非诗词类段落缩进
                if (article.category !== '诗' && article.category !== '词') {
                    content = content.replace(/<p>/g, '<p class="paragraph-indent">');
                }

                if (currentSearchKeyword) {
                    content = highlightContent(content, currentSearchKeyword);
                }

                document.getElementById('articleText').innerHTML = content;
                updateNavButtons();

                // 更新目录高亮（修正索引匹配）
                document.querySelectorAll('.article-list a').forEach((a, i) => {
                    const currentList = applyFilters();
                    const realIndex = i < currentList.length ? articles.indexOf(currentList[i]) : -1;
                    a.classList.toggle('active', realIndex === index);
                });

                if (window.innerWidth <= 768) {
                    switchTab('article');
                }
            }, 100);
        }

        function updateNavButtons() {
            const filtered = applyFilters();
            const currentFilteredIndex = filtered.indexOf(articles[currentArticleIndex]);
            
            document.querySelectorAll('#prevArticle, #prevArticleBottom, #mobilePrevArticle').forEach(btn => {
                if (currentFilteredIndex > 0) {
                    btn.style.visibility = 'visible';
                    btn.onclick = function(e) {
                        e.preventDefault();
                        loadArticle(articles.indexOf(filtered[currentFilteredIndex - 1]));
                    };
                } else {
                    btn.style.visibility = 'hidden';
                    btn.onclick = null;
                }
            });

            document.querySelectorAll('#nextArticle, #nextArticleBottom, #mobileNextArticle').forEach(btn => {
                if (currentFilteredIndex < filtered.length - 1) {
                    btn.style.visibility = 'visible';
                    btn.onclick = function(e) {
                        e.preventDefault();
                        loadArticle(articles.indexOf(filtered[currentFilteredIndex + 1]));
                    };
                } else {
                    btn.style.visibility = 'hidden';
                    btn.onclick = null;
                }
            });
        }

        function searchArticles() {
            currentSearchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!currentSearchKeyword) {
                renderArticleList();
                const filtered = applyFilters();
                if (filtered.length > 0) loadArticle(articles.indexOf(filtered[0]));
                return;
            }

            // 搜索只在当前卷内进行
            const currentVolumeArticles = getCurrentVolumeArticles();
            const filtered = currentVolumeArticles.filter(a =>
                a.title.toLowerCase().includes(currentSearchKeyword) ||
                a.content.toLowerCase().includes(currentSearchKeyword) ||
                a.category.toLowerCase().includes(currentSearchKeyword)
            );

            const listContainer = document.getElementById('articleList');
            if (filtered.length === 0) {
                listContainer.innerHTML = `<li style="text-align:center;padding:15px;color:#7A8B7B;">在当前卷中未找到包含"${currentSearchKeyword}"的文章</li>`;
                return;
            }

            listContainer.innerHTML = filtered.map(a => `
                <li>
                    <a href="#" onclick="loadArticle(${articles.indexOf(a)})">
                        <span class="article-number">${a.id}.</span>
                        ${highlightKeyword(a.title, currentSearchKeyword)}
                        <small>(${a.category})</small>
                    </a>
                </li>
            `).join('');

            loadArticle(articles.indexOf(filtered[0]));
        }

        function highlightKeyword(text, keyword) {
            if (!keyword) return text;
            return text.replace(new RegExp(`(${keyword})`, 'gi'), '<span class="highlight">$1</span>');
        }

        function highlightContent(html, keyword) {
            if (!keyword) return html;
            return html.replace(new RegExp(`(${keyword})`, 'gi'), '<span class="highlight">$1</span>');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="switchTab('${tabId}')"]`)?.classList.add('active');
            document.getElementById(tabId + 'Tab')?.classList.add('active');
            if (tabId === 'article') {
                document.getElementById('articleContent').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebarHidden = !sidebarHidden;
            sidebar.classList.toggle('hidden', sidebarHidden);
            document.getElementById('sidebar-icon').textContent = sidebarHidden ? '≡' : '×';
        }

        function initSidebar() {
            const isMobile = window.innerWidth <= 768;
            const toggle = document.querySelector('.sidebar-toggle');
            if (isMobile) {
                toggle.style.display = 'flex';
                document.querySelector('.sidebar').classList.remove('hidden');
                document.getElementById('sidebar-icon').textContent = '≡';
                sidebarHidden = false;
            } else {
                toggle.style.display = 'none';
            }
        }

        function initMobileTabs() {
            if (window.innerWidth <= 768) {
                document.querySelector('.tab-nav').style.display = 'flex';
                document.getElementById('catalogTab').style.display = 'block';
            }
        }

        // ============================================================
        // 6. 初始化
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // 加载数据
            loadArticlesFromTxt();

            // 事件监听
            document.getElementById('searchInput').addEventListener('input', function() {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(searchArticles, 300);
            });

            window.addEventListener('scroll', function() {
                const isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    const scrollTop = window.scrollY;
                    const sidebar = document.querySelector('.sidebar');
                    if (scrollTop > 100 && scrollTop > lastScrollTop && !sidebarHidden) {
                        sidebar.classList.add('hidden');
                        sidebarHidden = true;
                        document.getElementById('sidebar-icon').textContent = '≡';
                    } else if (scrollTop < 50 && sidebarHidden) {
                        sidebar.classList.remove('hidden');
                        sidebarHidden = false;
                        document.getElementById('sidebar-icon').textContent = '×';
                    }
                    lastScrollTop = scrollTop;
                }
            });

            window.addEventListener('resize', initSidebar);

            // 键盘导航
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    const filtered = applyFilters();
                    const idx = filtered.indexOf(articles[currentArticleIndex]);
                    if (idx > 0) loadArticle(articles.indexOf(filtered[idx - 1]));
                } else if (e.key === 'ArrowRight') {
                    const filtered = applyFilters();
                    const idx = filtered.indexOf(articles[currentArticleIndex]);
                    if (idx < filtered.length - 1) loadArticle(articles.indexOf(filtered[idx + 1]));
                }
            });

            initSidebar();
            initMobileTabs();
        });
    </script>
</body>
</html>
